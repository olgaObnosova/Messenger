<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Мессенджер - Смайлики, Файлы, Голос</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: background 0.3s;
        }

        body.theme-dark { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
        body.theme-nature { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
        body.theme-sunset { background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); }
        body.theme-ocean { background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%); }

        .messenger {
            width: 100%;
            max-width: 850px;
            height: 750px;
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            display: flex;
            flex-direction: row;
            overflow: hidden;
            transition: all 0.3s;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Боковая панель пользователей */
        .users-sidebar {
            width: 280px;
            background: #f8f9fa;
            border-left: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
        }

        .users-sidebar.hidden {
            display: none;
        }

        .users-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .users-header h3 { font-size: 16px; }
        .close-users {
            background: none;
            border: none;
            color: white;
            font-size: 20px;
            cursor: pointer;
        }

        .users-list {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .user-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px;
            border-radius: 12px;
            transition: background 0.2s;
        }

        .user-item:hover { background: #e9ecef; }

        .user-avatar-small {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .user-info { flex: 1; }
        .user-name { font-size: 14px; font-weight: 500; color: #333; }
        .online-dot {
            width: 10px;
            height: 10px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulseOnline 1.5s infinite;
        }

        @keyframes pulseOnline {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Фоны для окна диалога */
        .messenger.bg-default .messages-area { background: #f0f2f5; }
        .messenger.bg-dark .messages-area { background: #1a1a2e; }
        .messenger.bg-chat .messages-area {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23e8f4f8"/><circle cx="20" cy="20" r="15" fill="%23b2dfdb" opacity="0.3"/><circle cx="80" cy="40" r="20" fill="%23b2dfdb" opacity="0.3"/></svg>');
            background-repeat: repeat;
        }
        .messenger.bg-wood .messages-area {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200"><rect width="200" height="200" fill="%23d2a679"/><path d="M0 20 Q50 15 100 20 T200 20" stroke="%23b87333" fill="none" stroke-width="2"/></svg>');
            background-repeat: repeat;
        }
        .messenger.bg-stars .messages-area {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%231a1a2e"/><circle cx="20" cy="20" r="1.5" fill="white"/><circle cx="50" cy="15" r="1" fill="white"/></svg>');
            background-repeat: repeat;
        }

        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .current-avatar {
            width: 45px;
            height: 45px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
        }

        .header h2 { flex: 1; font-size: 18px; }

        .online-count {
            font-size: 12px;
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
        }

        .tools-header {
            display: flex;
            gap: 8px;
        }

        .tool-icon {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 6px 10px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-size: 16px;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: background 0.3s;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.outgoing {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            flex-shrink: 0;
        }

        .message-bubble {
            background: white;
            padding: 10px 14px;
            border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }

        .outgoing .message-bubble { background: #dcf8c5; }

        .message-username {
            font-size: 12px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 4px;
            display: block;
        }

        .message-text { font-size: 14px; }
        .message-time {
            font-size: 10px;
            color: #999;
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }

        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 200px;
        }

        .voice-play {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            color: white;
            cursor: pointer;
            font-size: 16px;
        }

        .voice-duration { font-size: 12px; color: #666; }

        .system-message {
            text-align: center;
            font-size: 12px;
            color: #666;
            background: #e0e0e0;
            padding: 6px 12px;
            border-radius: 20px;
            align-self: center;
        }

        .input-panel {
            padding: 12px 16px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .tools {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            flex-wrap: wrap;
            position: relative;
        }

        .tool-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 14px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
        }

        .input-row button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        /* Панель смайликов */
        .emoji-panel {
            position: absolute;
            bottom: 100%;
            left: 0;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            padding: 12px;
            margin-bottom: 8px;
            width: 350px;
            max-width: 85vw;
            display: none;
            z-index: 100;
        }

        .emoji-panel.show { display: block; }

        .emoji-categories {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 8px;
            flex-wrap: wrap;
        }

        .emoji-cat-btn {
            background: none;
            border: none;
            padding: 5px 12px;
            cursor: pointer;
            border-radius: 15px;
            font-size: 13px;
        }

        .emoji-cat-btn.active {
            background: #667eea;
            color: white;
        }

        .emoji-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            max-height: 200px;
            overflow-y: auto;
        }

        .emoji-item {
            font-size: 26px;
            text-align: center;
            cursor: pointer;
            padding: 6px;
            border-radius: 10px;
        }

        .emoji-item:hover { background: #f0f0f0; }

        .record-btn { background: #f44336 !important; }
        .record-btn.recording { animation: pulse 1s infinite; background: #ff0000 !important; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .theme-panel, .bg-panel, .avatar-selector {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border-radius: 25px;
            padding: 20px;
            z-index: 200;
            width: 350px;
            max-width: 90%;
            display: none;
        }

        .theme-panel.show, .bg-panel.show, .avatar-selector.show { display: block; }

        .theme-options, .bg-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .theme-option, .bg-option {
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            text-align: center;
        }

        .theme-default { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .theme-dark-theme { background: #1a1a2e; color: white; }
        .theme-nature-theme { background: #11998e; color: white; }
        .theme-sunset-theme { background: #f12711; color: white; }
        .theme-ocean-theme { background: #00b4db; color: white; }

        .bg-default { background: #f0f2f5; }
        .bg-dark { background: #1a1a2e; color: white; }
        .bg-chat { background: #e8f4f8; }
        .bg-wood { background: #d2a679; }
        .bg-stars { background: #1a1a2e; color: white; }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin: 15px 0;
        }

        .avatar-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .close-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 10px;
        }

        .login-screen {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 25px;
            width: 90%;
            max-width: 350px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
        }

        .login-avatars {
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            margin: 10px 0;
        }

        .login-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .login-avatar.selected { box-shadow: 0 0 0 3px #4caf50; }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .typing-indicator {
            font-size: 11px;
            color: #999;
            padding: 5px 16px;
            font-style: italic;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 140;
            display: none;
        }

        .overlay.show { display: block; }

        input[type="file"] { display: none; }

        .toggle-users {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 6px 10px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
        }

        @media (max-width: 600px) {
            .users-sidebar {
                position: absolute;
                right: 0;
                height: 100%;
                z-index: 150;
            }
        }
    </style>
</head>
<body>
    <div id="loginScreen" class="login-screen">
        <div class="login-box">
            <h2>💬 Мессенджер</h2>
            <input type="text" id="usernameInput" placeholder="Введите имя">
            <div class="login-avatars" id="loginAvatars"></div>
            <button class="login-btn" onclick="login()">Войти</button>
        </div>
    </div>

    <div id="mainUI" class="messenger" style="display: none;">
        <div class="chat-main">
            <div class="header">
                <div class="current-avatar" id="currentAvatar" onclick="openAvatarSelector()"></div>
                <h2>💬 Общий чат</h2>
                <div class="online-count" id="onlineCount" onclick="toggleUsersPanel()">0 онлайн</div>
                <div class="tools-header">
                    <button class="tool-icon" onclick="openThemePanel()">🎨</button>
                    <button class="tool-icon" onclick="openBgPanel()">🖼️</button>
                    <button class="toggle-users" onclick="toggleUsersPanel()">👥</button>
                </div>
            </div>

            <div class="messages-area" id="messagesArea"></div>
            
            <div class="typing-indicator" id="typingIndicator"></div>
            
            <div class="input-panel">
                <div class="tools">
                    <button class="tool-btn" onclick="toggleEmojiPanel()">😊 Смайлики</button>
                    <button class="tool-btn" onclick="document.getElementById('fileInput').click()">📎 Файл</button>
                    <button class="tool-btn" id="recordBtn" onclick="toggleRecording()">🎤 Голос</button>
                    <input type="file" id="fileInput" onchange="uploadFile(this)">
                    
                    <div class="emoji-panel" id="emojiPanel">
                        <div class="emoji-categories" id="emojiCategories"></div>
                        <div class="emoji-grid" id="emojiGrid"></div>
                    </div>
                </div>
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                    <button onclick="sendMessage()">Отправить</button>
                </div>
            </div>
        </div>

        <div class="users-sidebar" id="usersSidebar">
            <div class="users-header">
                <h3>👥 Пользователи онлайн</h3>
                <button class="close-users" onclick="toggleUsersPanel()">✖️</button>
            </div>
            <div class="users-list" id="usersList"></div>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeAllPanels()"></div>
    
    <div id="themePanel" class="theme-panel">
        <h3>🎨 Выберите тему</h3>
        <div class="theme-options">
            <div class="theme-option theme-default" onclick="setTheme('default')">🌈 По умолчанию</div>
            <div class="theme-option theme-dark-theme" onclick="setTheme('dark')">🌙 Темная</div>
            <div class="theme-option theme-nature-theme" onclick="setTheme('nature')">🌿 Природа</div>
            <div class="theme-option theme-sunset-theme" onclick="setTheme('sunset')">🌅 Закат</div>
            <div class="theme-option theme-ocean-theme" onclick="setTheme('ocean')">🌊 Океан</div>
        </div>
        <button class="close-btn" onclick="closeThemePanel()">Закрыть</button>
    </div>

    <div id="bgPanel" class="bg-panel">
        <h3>🖼️ Выберите фон чата</h3>
        <div class="bg-options">
            <div class="bg-option bg-default" onclick="setBg('default')">☁️ Обычный</div>
            <div class="bg-option bg-dark" onclick="setBg('dark')">🌙 Темный</div>
            <div class="bg-option bg-chat" onclick="setBg('chat')">💬 Облачка</div>
            <div class="bg-option bg-wood" onclick="setBg('wood')">🪵 Дерево</div>
            <div class="bg-option bg-stars" onclick="setBg('stars')">⭐ Звезды</div>
        </div>
        <button class="close-btn" onclick="closeBgPanel()">Закрыть</button>
    </div>

    <div id="avatarSelector" class="avatar-selector">
        <h3>Выберите аватар</h3>
        <div class="avatar-grid" id="avatarGrid"></div>
        <button class="close-btn" onclick="closeAvatarSelector()">Закрыть</button>
    </div>

    <script>
        const AVATARS = ["😀", "😎", "🥳", "🤓", "😍", "🦊", "🐱", "🐶", "🐼", "🦁", "⭐", "🌟", "🔥", "💪", "🎨", "🎮"];
        
        const EMOJIS = {

            "❤️ Сердца": ["❤️", "🧡", "💛", "💚", "💙", "💜", "🖤", "🤍", "🤎", "💔", "❣️", "💕", "💞", "💓", "💗", "💖", "💘", "💝", "💟"],
            "🐱 Животные": ["🐶", "🐱", "🐭", "🐹", "🐰", "🦊", "🐻", "🐼", "🐨", "🐯", "🦁", "🐮", "🐷", "🐸", "🐒", "🐔", "🐧", "🐦", "🐤", "🐣", "🐥", "🐺", "🐗", "🐴", "🦄", "🐝", "🐛", "🦋", "🐌", "🐞", "🐜", "🐢", "🐍", "🐙", "🦑", "🐠", "🐟", "🐡", "🐬", "🐳", "🐋", "🦈"],
            "🍔 Еда": ["🍎", "🍐", "🍊", "🍋", "🍌", "🍉", "🍇", "🍓", "🍒", "🍑", "🥭", "🍍", "🥥", "🥝", "🍅", "🍆", "🥑", "🥦", "🥬", "🥒", "🌶️", "🌽", "🥕", "🥔", "🍠", "🥐", "🥯", "🍞", "🥖", "🥨", "🧀", "🥚", "🍳", "🥞", "🧇", "🥓", "🥩", "🍗", "🍖", "🌭", "🍔", "🍟", "🍕", "🥪", "🥙", "🌮", "🌯", "🥗", "🥘", "🍝", "🍜", "🍲", "🍛", "🍣", "🍱", "🍤", "🍙", "🍚", "🍘", "🍥", "🍢", "🍡", "🍧", "🍨", "🍦", "🥧", "🧁", "🍰", "🎂", "🍮", "🍭", "🍬", "🍫", "🍿", "🍩", "🍪", "🥜", "🍯", "☕", "🍵", "🥤", "🍺", "🍻", "🥂"],
            "🎉 Праздники": ["🎄", "🎅", "🤶", "🕎", "✡️", "☸️", "☯️", "🕉️", "🕊️", "🎃", "👻", "💀", "🎉", "🎊", "🎈", "🎂", "🎁", "💝", "💐", "🌸", "🌺", "🌻", "🌼", "🌷", "🌹", "🥀", "🍀", "🌿", "☘️", "🍁", "🍂", "🍃"]
        };

        let socket = null;
        let currentUser = null;
        let currentAvatar = null;
        let typingTimeout = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let recordingStartTime = null;
        let usersData = new Map();

        function initEmojiPanel() {
            const categoriesDiv = document.getElementById('emojiCategories');
            const gridDiv = document.getElementById('emojiGrid');
            if (!categoriesDiv || !gridDiv) return;
            
            let activeCategory = Object.keys(EMOJIS)[0];
            
            Object.keys(EMOJIS).forEach(cat => {
                const btn = document.createElement('button');
                btn.textContent = cat;
                btn.className = 'emoji-cat-btn';
                if (cat === activeCategory) btn.classList.add('active');
                btn.onclick = () => {
                    document.querySelectorAll('.emoji-cat-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    showEmojis(cat);
                };
                categoriesDiv.appendChild(btn);
            });
            
            function showEmojis(category) {
                gridDiv.innerHTML = '';
                EMOJIS[category].forEach(emoji => {
                    const emojiDiv = document.createElement('div');
                    emojiDiv.className = 'emoji-item';
                    emojiDiv.textContent = emoji;
                    emojiDiv.onclick = () => {
                        const input = document.getElementById('messageInput');
                        input.value += emoji;
                        input.focus();
                        document.getElementById('emojiPanel').classList.remove('show');
                    };
                    gridDiv.appendChild(emojiDiv);
                });
            }
            showEmojis(activeCategory);
        }

        function toggleEmojiPanel() {
            const panel = document.getElementById('emojiPanel');
            if (panel) panel.classList.toggle('show');
        }

        function toggleUsersPanel() {
            const sidebar = document.getElementById('usersSidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('hidden');
            overlay.classList.toggle('show');
        }

        function initLoginAvatars() {
            const container = document.getElementById('loginAvatars');
            container.innerHTML = '';
            AVATARS.forEach(avatar => {
                const div = document.createElement('div');
                div.className = 'login-avatar';
                div.textContent = avatar;
                div.onclick = () => {
                    document.querySelectorAll('.login-avatar').forEach(a => a.classList.remove('selected'));
                    div.classList.add('selected');
                    currentAvatar = avatar;
                };
                container.appendChild(div);
            });
            if (container.firstChild) {
                container.firstChild.classList.add('selected');
                currentAvatar = AVATARS[0];
            }
        }

        function login() {
            const username = document.getElementById('usernameInput').value.trim();
            if (!username) return;
            
            currentUser = username;
            
            socket = io();
            
            socket.on('connect', () => {
                socket.emit('join', { username: currentUser, avatar: currentAvatar });
            });
            
            socket.on('joined', (data) => {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainUI').style.display = 'flex';
                document.getElementById('currentAvatar').textContent = currentAvatar;
                document.getElementById('onlineCount').textContent = data.users.length + ' онлайн';
                
                if (data.usersData) {
                    data.usersData.forEach(u => usersData.set(u.username, u.avatar));
                }
                
                updateUsersList(data.users);
                data.messages.forEach(msg => addMessage(msg));
            });
            
            socket.on('new_message', (data) => addMessage(data));
            socket.on('user_joined', (data) => {
                if (data.avatar) usersData.set(data.username, data.avatar);
                updateUsersList(data.users);
                addSystemMessage(`${data.username} присоединился`);
                document.getElementById('onlineCount').textContent = data.users.length + ' онлайн';
            });
            socket.on('user_left', (data) => {
                updateUsersList(data.users);
                addSystemMessage(`${data.username} покинул чат`);
                document.getElementById('onlineCount').textContent = data.users.length + ' онлайн';
            });
            socket.on('typing_update', (data) => {
                const indicator = document.getElementById('typingIndicator');
                if (data.users && data.users.length > 0 && !data.users.includes(currentUser)) {
                    indicator.textContent = `✏️ ${data.users.join(', ')} печатает...`;
                } else {
                    indicator.textContent = '';
                }
            });
            
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
            document.getElementById('messageInput').addEventListener('input', () => handleTyping());
        }
        
        function updateUsersList(users) {
            const container = document.getElementById('usersList');
            container.innerHTML = '';
            users.forEach(user => {
                const userAvatar = usersData.get(user) || '😀';
                const div = document.createElement('div');
                div.className = 'user-item';
                div.innerHTML = `
                    <div class="user-avatar-small">${escapeHtml(userAvatar)}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user)}</div>
                    </div>
                    <div class="online-dot"></div>
                `;
                container.appendChild(div);
            });
        }
        
        function handleTyping() {
            socket.emit('typing_start', { username: currentUser });
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing_stop', { username: currentUser });
            }, 1000);
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;
            socket.emit('send_message', { message: message });
            input.value = '';
        }
        
        function uploadFile(input) {
            const file = input.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('username', currentUser);
            
            fetch('/upload', {
                method: 'POST',
                body: formData
            }).then(response => response.json())
              .then(data => {
                  if (data.success) addMessage(data.message);
              });
            input.value = '';
        }
        
        async function toggleRecording() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        const formData = new FormData();
                        formData.append('audio', audioBlob, 'voice.webm');
                        formData.append('username', currentUser);
                        formData.append('duration', Math.round((Date.now() - recordingStartTime) / 1000));
                        
                        fetch('/upload-voice', {
                            method: 'POST',
                            body: formData
                        }).then(response => response.json())
                          .then(data => {
                              if (data.success) addMessage(data.message);
                          });
                        
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start(100);
                    isRecording = true;
                    recordingStartTime = Date.now();
                    const recordBtn = document.getElementById('recordBtn');
                    recordBtn.classList.add('recording');
                    recordBtn.textContent = '⏹️ 0 сек';
                    
                    const timer = setInterval(() => {
                        if (isRecording) {
                            const elapsed = Math.round((Date.now() - recordingStartTime) / 1000);
                            recordBtn.textContent = `⏹️ ${elapsed} сек`;
                        } else {
                            clearInterval(timer);
                        }
                    }, 1000);
                } catch (err) {
                    alert('Нет доступа к микрофону');
                }
            } else {
                if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                    mediaRecorder.stop();
                }
                isRecording = false;
                const recordBtn = document.getElementById('recordBtn');
                recordBtn.classList.remove('recording');
                recordBtn.textContent = '🎤 Голос';
            }
        }
        
        function playVoice(btn, url) {
            const audio = new Audio(url);
            audio.play();
            btn.textContent = '⏸️';
            audio.onended = () => btn.textContent = '▶️';
        }
        
        function addMessage(data) {
            const container = document.getElementById('messagesArea');
            const div = document.createElement('div');
            const isOwn = data.username === currentUser;
            div.className = `message ${isOwn ? 'outgoing' : ''}`;
            
            let content = '';
            if (data.type === 'text') {
                content = `<div class="message-text">${escapeHtml(data.message)}</div>`;
            } else if (data.type === 'image') {
                content = `<img src="${data.message}" class="message-image" onclick="window.open('${data.message}')">`;
            } else if (data.type === 'voice' && data.voice_info) {
                content = `
                    <div class="voice-message">
                        <button class="voice-play" onclick="playVoice(this, '${data.voice_info.url}')">▶️</button>
                        <span class="voice-duration">${data.voice_info.duration || 0} сек</span>
                    </div>
                `;
            } else if (data.file_info) {
                content = `<div>📎 ${escapeHtml(data.file_info.filename)}</div>`;
            }
            
            div.innerHTML = `
                <div class="message-avatar">${data.avatar || '😀'}</div>
                <div class="message-bubble">
                    <span class="message-username">${escapeHtml(data.username)}</span>
                    ${content}
                    <span class="message-time">${data.timestamp}</span>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function addSystemMessage(message) {
            const container = document.getElementById('messagesArea');
            const div = document.createElement('div');
            div.className = 'system-message';
            div.textContent = message;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }
        
        function openThemePanel() {
            document.getElementById('themePanel').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }
        
        function closeThemePanel() {
            document.getElementById('themePanel').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        
        function openBgPanel() {
            document.getElementById('bgPanel').classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }
        
        function closeBgPanel() {
            document.getElementById('bgPanel').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        
        function setTheme(theme) {
            const body = document.body;
            body.classList.remove('theme-dark', 'theme-nature', 'theme-sunset', 'theme-ocean');
            if (theme === 'dark') body.classList.add('theme-dark');
            else if (theme === 'nature') body.classList.add('theme-nature');
            else if (theme === 'sunset') body.classList.add('theme-sunset');
            else if (theme === 'ocean') body.classList.add('theme-ocean');
            localStorage.setItem('chatTheme', theme);
            closeThemePanel();
        }
        
        function setBg(bgType) {
            const messenger = document.querySelector('.messenger');
            messenger.classList.remove('bg-default', 'bg-dark', 'bg-chat', 'bg-wood', 'bg-stars');
            messenger.classList.add(`bg-${bgType}`);
            localStorage.setItem('chatBg', bgType);
            closeBgPanel();
        }
        
        function loadSavedSettings() {
            const savedTheme = localStorage.getItem('chatTheme');
            if (savedTheme && savedTheme !== 'default') setTheme(savedTheme);
            const savedBg = localStorage.getItem('chatBg');
            if (savedBg) document.querySelector('.messenger').classList.add(`bg-${savedBg}`);
            else document.querySelector('.messenger').classList.add('bg-default');
        }
        
        function openAvatarSelector() {
            const selector = document.getElementById('avatarSelector');
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            AVATARS.forEach(avatar => {
                const div = document.createElement('div');
                div.className = 'avatar-option';
                div.textContent = avatar;
                if (currentAvatar === avatar) div.classList.add('selected');
                div.onclick = () => {
                    currentAvatar = avatar;
                    document.getElementById('currentAvatar').textContent = currentAvatar;
                    if (socket) socket.emit('update_avatar', { username: currentUser, avatar: currentAvatar });
                    closeAvatarSelector();
                };
                grid.appendChild(div);
            });
            selector.classList.add('show');
            document.getElementById('overlay').classList.add('show');
        }
        
        function closeAvatarSelector() {
            document.getElementById('avatarSelector').classList.remove('show');
            document.getElementById('overlay').classList.remove('show');
        }
        
        function closeAllPanels() {
            closeThemePanel();
            closeBgPanel();
            closeAvatarSelector();
            document.getElementById('overlay').classList.remove('show');
            document.getElementById('usersSidebar').classList.add('hidden');
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        document.addEventListener('click', (e) => {
            const panel = document.getElementById('emojiPanel');
            const btn = e.target.closest('.tool-btn');
            if (panel && panel.classList.contains('show') && !panel.contains(e.target) && (!btn || btn.textContent !== '😊 Смайлики')) {
                panel.classList.remove('show');
            }
        });
        
        initLoginAvatars();
        initEmojiPanel();
        loadSavedSettings();
    </script>
</body>
